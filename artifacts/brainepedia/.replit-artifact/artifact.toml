kind = "web"
previewPath = "/"
title = "Brainepedia"
version = "1.0.0"
id = "artifacts/brainepedia"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23465

[services.development]
run = "pnpm --filter @workspace/brainepedia run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/brainepedia", "run", "build" ]
publicDir = "artifacts/brainepedia/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23465"
BASE_PATH = "/"
